resources:
  jobs:
    PL_Segments_gold:
      name: PL_Segments_gold
      tasks:
        - task_key: run_customer_segmentation_gold
          notebook_task:
            notebook_path: pipelines/customer_segmentation_gold
            source: GIT
        - task_key: run_segment_summary_gold
          depends_on:
            - task_key: run_customer_segmentation_gold
          notebook_task:
            notebook_path: pipelines/segment_summary_gold
            source: GIT
      git_source:
        git_url: https://github.com/nachh07/sales-and-facts-medallion.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED
